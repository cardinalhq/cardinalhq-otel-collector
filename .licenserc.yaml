header:
  license:
    spdx-id: Apache-2.0
    copyright-owner: CardinalHQ, Inc
    copyright-year: 2024-2025

  paths-ignore:
    - 'bin'
    - distribution
    - receiver/chqprwreceiver
    - docker/run-with-env-config.sh
    - internal/identity/resource.go
    - '**/*.md'
    - 'LICENSE'
    - 'NOTICE'
    - .gitignore
    - .dockerignore
    - .helmignore
    - .github
    - .licenserc.yaml
    - '**/*.yaml'
    - '**/*.yml'
    - go.sum
    - go.mod
    - sample-config.yaml
    - '**/testdata/**'
    - .idea
    - docs/flow/flow.svg
    - exporter/awss3exporter
    - examples/prometheus/remote-write.conf

  comment: on-failure

  language:
    rl:
      extensions:
        - '.rl'
      comment_style_id: DoubleSlash
    dot:
      extensions:
        - '.dot'
      comment_style_id: Hashtag

# If you don't want to check dependencies' license compatibility, remove the following part
dependency:
  files:
    - go.mod
