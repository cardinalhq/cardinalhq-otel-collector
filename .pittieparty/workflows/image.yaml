#
# Cross-build the pure-Go collector binary for amd64+arm64 on a single amd64
# node, package both with the thin Dockerfile.cross into a multi-arch image, and
# push it to Harbor. This is now the ONLY image build: it owns PR, default-branch
# (main), AND release-tag images (the old .woodpecker/image.yaml is gone).
#
# SCOPE: all trusted pushes -- PR-branch, default-branch (main), and tags.
# on: [push, tag] (never pull_request -- a PR can't publish). The GitHub Actions
# workflows then copy this image Harbor -> ECR with no rebuild, waiting on the
# pittieparty/image Check (.github/workflows/{pr-image-to-ecr,dev,release}.yml).
#
# Tag scheme (mirrors the old Woodpecker .tags + GHA's compute):
#   tag push            -> {tag}                       e.g. v1.2.3 / v1.2.3-rc1
#   PR-head push        -> v0.0.0-pr{pr}-{sha8}         ({pr} resolved from the open PR)
#   default-branch push -> v0.0.0-{default_branch}-{sha8}
# A default-branch / PR build also warms the durable Go + buildkit caches on the
# trusted ref so PR builds stay fast. A feature-branch push is a PR build: the
# controller resolves the open PR and skips the build if none appears.
#
# Publishes to docker.flame.org/library/cardinalhq-otel-collector via the
# platform publisher robot (controller maps docker.flame.org=registry-flame in
# PUBLISH_REGISTRIES). Only trusted pushes publish; pull_request can't (so on:
# omits it).
#
# The collector is pure Go with CGO_ENABLED=0, so the arm64 binary cross-compiles
# natively on this amd64 node -- no cross toolchain and no QEMU.
#
# Platform-provided (never configured here): languages: [go] wires the Athens
# GOPROXY and the warm Go cache; git_token exposes the per-run installation token
# as GIT_TOKEN (private cardinalhq/* Go modules). PP_GIT_* are platform-provided
# (pittieparty v0.5.26+): PP_GIT_TAG / PP_GIT_PR_NUMBER / PP_GIT_BRANCH /
# PP_GIT_SHA8. Commands run as one `sh -eu` script in the default toolchain image
# (woodpecker-builder), repo root as cwd.
version: 1
on: [push, tag]
build:
  git_token: true
  languages: [go]
  # goreleaser cross-builds the full collector distribution (huge module graph)
  # for both arches; linking that binary is multi-GB per arch. 16Gi is the
  # controller's cap (defaultCompileMemoryMax); combined with --parallelism 1
  # below (one arch linked at a time) it keeps peak under the limit.
  memory: 16Gi
  commands:
    # Private cardinalhq/* modules over HTTPS: scope the token to cardinalhq only.
    - git config --global url."https://x-access-token:${GIT_TOKEN}@github.com/cardinalhq/".insteadOf "https://github.com/cardinalhq/"
    - export GOPRIVATE='github.com/cardinalhq/*'
    - go version && goreleaser --version

    # Stamp the binary with the image tag (mirrors image.tags below): the real
    # git tag on a tag push, else the resolved open-PR number, else the
    # branch fallback (covers the rare branch-push-without-PR window before the
    # controller skips).
    - |
      if [ -n "$PP_GIT_TAG" ]; then
        export IMAGE_VERSION="$PP_GIT_TAG"
      elif [ -n "$PP_GIT_PR_NUMBER" ]; then
        export IMAGE_VERSION="v0.0.0-pr${PP_GIT_PR_NUMBER}-${PP_GIT_SHA8}"
      else
        export IMAGE_VERSION="v0.0.0-$(echo "$PP_GIT_BRANCH" | tr '/' '-')-${PP_GIT_SHA8}"
      fi
      echo "Building image version $IMAGE_VERSION"

    # Cross-build the Go binary for amd64+arm64 (no QEMU, no CGO). --parallelism 1
    # links one arch at a time: the collector binary's link step is multi-GB, and
    # goreleaser's default concurrent two-arch link OOMs even at 16Gi.
    - goreleaser build --snapshot --clean --parallelism 1 --config .goreleaser.cross.yaml

    # Stage the per-arch binary where Dockerfile.cross copies it.
    - |
      for arch in amd64 arm64; do
        mkdir -p docker/bin/linux_$arch
        cp dist/cardinalhq-otel-collector_linux_${arch}*/cardinalhq-otel-collector docker/bin/linux_$arch/cardinalhq-otel-collector
      done
    - ls -l docker/bin/linux_amd64 docker/bin/linux_arm64
image:
  name: docker.flame.org/library/cardinalhq-otel-collector
  dockerfile: Dockerfile.cross
  platforms: [linux/amd64, linux/arm64]
  # {tag} resolves on tag pushes, {pr} on PR-branch pushes, {default_branch} on
  # main pushes; the entry whose var is empty for a given push is dropped
  # (every-entry-dropped is an error).
  tags: ["{tag}", "v0.0.0-pr{pr}-{sha8}", "v0.0.0-{default_branch}-{sha8}"]
