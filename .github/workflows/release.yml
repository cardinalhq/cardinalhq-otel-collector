name: goreleaser-release-latest

# GA tags (vX.Y.Z, not vX.Y.Z-*).
#
# Default path COPIES the multi-arch image pittieparty built and pushed to Harbor
# (docker.flame.org/library/cardinalhq-otel-collector, see
# .pittieparty/workflows/image.yaml) into public ECR -- no rebuild, the build
# cache stays on the cluster. Set repo variable IMAGE_BUILD_SOURCE=gha to build
# the image in Actions (goreleaser) instead, e.g. if the cluster is down.
#
# The GitHub Release publishes regardless of the image source.

on:
  push:
    tags:
      - "v*"
      - "!v*-*"

permissions:
  contents: read

jobs:
  # Default: copy the pittieparty-built image from Harbor to ECR (no rebuild).
  copy-image:
    if: ${{ vars.IMAGE_BUILD_SOURCE != 'gha' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # AWS OIDC for ECR push
      checks: read      # read the pittieparty/image check run
    steps:
      - uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          role-to-assume: arn:aws:iam::${{ secrets.ECR_ACCOUNT_ID }}:role/${{ secrets.ECR_ROLE_NAME }}
          aws-region: ${{ secrets.ECR_REGISTRY_REGION }}
          role-session-name: GitHubActions

      - name: Login to PUBLIC Amazon ECR
        env:
          AWS_REGION: us-east-1
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # pittieparty reports the image build as a GitHub Check run (not a commit
      # status), so wait on the Checks API.
      - name: Wait for pittieparty image build
        uses: cardinalhq/actions/wait-for-check@v1
        with:
          check-name: pittieparty/image
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-hint: Set repo variable IMAGE_BUILD_SOURCE=gha to build in Actions.

      - name: Copy image from pittieparty (Harbor) to ECR
        uses: cardinalhq/actions/copy-image@v1
        with:
          source: docker.flame.org/library/cardinalhq-otel-collector:${{ github.ref_name }}
          targets: |
            public.ecr.aws/cardinalhq.io/cardinalhq-otel-collector:${{ github.ref_name }}
          pin-source: true   # copy from immutable source digest
          sign: true         # keyless-sign destination ref (cosign)

  # Fallback: build the image in Actions (goreleaser -> ECR) when the cluster is
  # unavailable. Enabled by repo variable IMAGE_BUILD_SOURCE=gha.
  gha-build:
    if: ${{ vars.IMAGE_BUILD_SOURCE == 'gha' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # AWS OIDC for ECR push
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: go-cache-paths
        id: go-cache-paths
        run: |
          echo "go-build=$(go env GOCACHE)" >> $GITHUB_OUTPUT
          echo "go-mod=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT

      - name: Go Build Cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-${{ runner.arch }}-go-build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          role-to-assume: arn:aws:iam::${{ secrets.ECR_ACCOUNT_ID }}:role/${{ secrets.ECR_ROLE_NAME }}
          aws-region: ${{ secrets.ECR_REGISTRY_REGION }}
          role-session-name: GitHubActions

      - name: Login to PUBLIC Amazon ECR
        env:
          AWS_REGION: us-east-1
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "nightly"
          args: release --clean -f .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

  # Publish the GitHub Release regardless of which image path ran.
  release:
    needs: [copy-image, gha-build]
    if: ${{ always() && !cancelled() && (needs.copy-image.result == 'success' || needs.gha-build.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release create
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; skipping creation."
            exit 0
          fi

          LAST_RELEASE=$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --exclude-pre-releases \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName' || echo "")

          if [ -n "$LAST_RELEASE" ]; then
            RELEASE_NOTES="## Changes since ${LAST_RELEASE}"$'\n\n'
            RELEASE_NOTES+=$(git log --oneline "${LAST_RELEASE}..HEAD" --no-merges | sed 's/^/* /')
          else
            RELEASE_NOTES="## Changes"$'\n\n'
            RELEASE_NOTES+=$(git log --oneline --no-merges | head -10 | sed 's/^/* /')
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release $RELEASE_TAG" \
            --notes "$RELEASE_NOTES" \
            --latest
